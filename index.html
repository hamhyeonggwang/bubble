<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>한글 버블 게임</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700;900&family=Space+Grotesk:wght@300;400;700&display=swap');

  :root {
    --bg: #111111;
    --mat-black: #1a1a1a;
    --card-bg: #FFF8F0;
    --accent: #FF4B2B;
    --accent2: #FF8C00;
    --gold: #FFD700;
    --glow-consonant: #FF4B2B;
    --glow-vowel: #FFD060;
    --white: #FFFFFF;
    --ivory: #FFF8F0;
    --text-dim: #555;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    flex-direction: column;
    user-select: none;
  }

  /* ── 상단 카드 영역 ── */
  #top-bar {
    position: relative;
    z-index: 20;
    padding: 16px 24px 12px;
    background: linear-gradient(180deg, #0e0e0e 80%, transparent);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }

  .game-label {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--accent);
    text-transform: uppercase;
    font-weight: 700;
    opacity: 0.8;
  }

  #word-card {
    background: var(--ivory);
    border-radius: 20px;
    padding: 16px 36px;
    box-shadow: 0 8px 40px rgba(255,75,43,0.25), 0 2px 12px rgba(0,0,0,0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 320px;
    max-width: 90vw;
    transition: box-shadow 0.3s;
  }

  #word-card.complete {
    box-shadow: 0 8px 60px rgba(255,215,0,0.5), 0 2px 12px rgba(0,0,0,0.5);
    animation: cardPop 0.5s ease;
  }

  @keyframes cardPop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }

  #target-word {
    font-size: 28px;
    font-weight: 900;
    color: #1a1a1a;
    letter-spacing: 6px;
  }

  #collect-track {
    display: flex;
    gap: 6px;
    align-items: center;
  }

  .jamo-slot {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    border: 2px solid #ddd;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 900;
    color: #bbb;
    background: #f0f0f0;
    transition: all 0.3s;
    opacity: 0.55;
  }

  .jamo-slot.collected {
    background: linear-gradient(135deg, #FF4B2B, #FF8C00);
    border-color: #FF4B2B;
    color: white;
    transform: scale(1.12);
    box-shadow: 0 0 14px rgba(255,75,43,0.5);
    animation: slotPop 0.3s ease;
    opacity: 1;
  }

  @keyframes slotPop {
    0% { transform: scale(0.7); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1.1); }
  }

  /* 점수/단계 */
  #hud {
    display: flex;
    gap: 24px;
    align-items: center;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--accent);
    text-transform: uppercase;
    opacity: 0.7;
  }

  .hud-val {
    font-size: 20px;
    font-weight: 900;
    color: var(--ivory);
  }

  /* ── 게임 캔버스 영역 ── */
  #game-wrap {
    position: relative;
    flex: 1;
    overflow: hidden;
  }

  #webcam {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transform: scaleX(-1);
  }

  #game-canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
  }

  /* ── 오버레이 UI ── */
  #status-badge {
    position: absolute;
    bottom: 20px;
    right: 20px;
    background: rgba(26,26,26,0.85);
    border: 1px solid rgba(255,75,43,0.3);
    border-radius: 12px;
    padding: 8px 16px;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    z-index: 30;
    transition: all 0.3s;
  }

  #status-badge.ready {
    color: #4CAF50;
    border-color: rgba(76,175,80,0.4);
  }

  /* ── 시작 화면 ── */
  #start-screen {
    position: absolute;
    inset: 0;
    background: rgba(17,17,17,0.97);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 28px;
  }

  .start-title {
    font-size: 48px;
    font-weight: 900;
    color: var(--ivory);
    letter-spacing: 4px;
    text-align: center;
    line-height: 1.1;
  }

  .start-title span {
    background: linear-gradient(135deg, #FF4B2B, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .start-desc {
    color: #888;
    font-size: 14px;
    text-align: center;
    line-height: 1.8;
    max-width: 340px;
  }

  .start-desc strong {
    color: var(--accent);
  }

  .guide-cards {
    display: flex;
    gap: 16px;
  }

  .guide-card {
    background: var(--mat-black);
    border: 1px solid rgba(255,75,43,0.2);
    border-radius: 16px;
    padding: 18px 20px;
    text-align: center;
    width: 130px;
  }

  .guide-icon {
    font-size: 32px;
    margin-bottom: 8px;
  }

  .guide-text {
    font-size: 12px;
    color: #999;
    line-height: 1.5;
  }

  .guide-text strong {
    color: var(--ivory);
    display: block;
    margin-bottom: 2px;
  }

  .start-btn {
    background: linear-gradient(135deg, #FF4B2B, #FF8C00);
    border: none;
    border-radius: 20px;
    padding: 16px 56px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: white;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 24px rgba(255,75,43,0.4);
  }

  .start-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 36px rgba(255,75,43,0.6);
  }

  /* ── 완성 축하 ── */
  #complete-overlay {
    position: absolute;
    inset: 0;
    background: rgba(17,17,17,0.85);
    z-index: 40;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }

  #complete-overlay.show {
    display: flex;
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .complete-word {
    font-size: 72px;
    font-weight: 900;
    letter-spacing: 12px;
    background: linear-gradient(135deg, #FF4B2B, #FFD700);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: wordShine 1s ease infinite alternate;
  }

  @keyframes wordShine {
    from { filter: brightness(1); }
    to { filter: brightness(1.4); }
  }

  .complete-msg {
    font-size: 16px;
    color: var(--ivory);
    opacity: 0.7;
    letter-spacing: 2px;
  }

  /* ── 주먹 감지 인디케이터 ── */
  #fist-indicator {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 30;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .fist-ring {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: 2px solid rgba(255,75,43,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    transition: all 0.2s;
  }

  .fist-ring.active {
    border-color: var(--accent);
    box-shadow: 0 0 20px rgba(255,75,43,0.6);
    background: rgba(255,75,43,0.1);
  }

  .fist-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    color: #555;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- 상단 카드 -->
<div id="top-bar">
  <div class="game-label">✦ 한글 버블 게임 ✦</div>
  <div id="word-card">
    <div id="target-word">로딩중</div>
    <div id="collect-track"></div>
  </div>
  <div id="hud">
    <div class="hud-item">
      <div class="hud-label">Score</div>
      <div class="hud-val" id="score-val">0</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Stage</div>
      <div class="hud-val" id="stage-val">1</div>
    </div>
    <div class="hud-item">
      <div class="hud-label">Time</div>
      <div class="hud-val" id="timer-val">60</div>
    </div>
  </div>
</div>

<!-- 게임 영역 -->
<div id="game-wrap">
  <video id="webcam" playsinline autoplay muted></video>
  <canvas id="game-canvas"></canvas>

  <!-- 주먹 인디케이터 -->
  <div id="fist-indicator">
    <div class="fist-ring" id="fist-ring">✊</div>
    <div class="fist-label">Fist</div>
  </div>

  <!-- 상태 뱃지 -->
  <div id="status-badge">📷 카메라 연결 중...</div>

  <!-- 완성 오버레이 -->
  <div id="complete-overlay">
    <div class="complete-word" id="complete-word-display"></div>
    <div class="complete-msg">완성! 다음 단어로...</div>
  </div>
</div>

<!-- 시작 화면 -->
<div id="start-screen">
  <div class="start-title">한글<br><span>버블 게임</span></div>
  <div class="start-desc">
    빛나는 자음과 모음을 찾아<br>
    <strong>주먹을 쥐어 터뜨리세요!</strong><br>
    단어 카드의 글자를 모두 수집하면 클리어
  </div>
  <div class="guide-cards">
    <div class="guide-card">
      <div class="guide-icon">✨</div>
      <div class="guide-text"><strong>버블 찾기</strong>자음·모음이<br>빛나며 pulse</div>
    </div>
    <div class="guide-card">
      <div class="guide-icon">✊</div>
      <div class="guide-text"><strong>주먹 쥐기</strong>버블 위에서<br>주먹을 쥐세요</div>
    </div>
    <div class="guide-card">
      <div class="guide-icon">💥</div>
      <div class="guide-text"><strong>글로우 버스트</strong>빛이 터지며<br>자모 수집!</div>
    </div>
  </div>
  <button class="start-btn" id="start-btn">START GAME</button>
</div>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
// ══════════════════════════════
//  데이터: 단어 목록 (자모 분리)
// ══════════════════════════════
const WORD_LIST = [
  { word: '나비', jamo: ['ㄴ','ㅏ','ㅂ','ㅣ'] },
  { word: '오리', jamo: ['ㅇ','ㅗ','ㄹ','ㅣ'] },
  { word: '기차', jamo: ['ㄱ','ㅣ','ㅊ','ㅏ'] },
  { word: '바나나', jamo: ['ㅂ','ㅏ','ㄴ','ㅏ','ㄴ','ㅏ'] },
  { word: '고양이', jamo: ['ㄱ','ㅗ','ㅇ','ㅏ','ㅇ','ㅣ'] },
  { word: '토끼', jamo: ['ㅌ','ㅗ','ㄲ','ㅣ'] },
  { word: '사자', jamo: ['ㅅ','ㅏ','ㅈ','ㅏ'] },
  { word: '우유', jamo: ['ㅇ','ㅜ','ㅇ','ㅠ'] },
  { word: '아기', jamo: ['ㅇ','ㅏ','ㄱ','ㅣ'] },
  { word: '포도', jamo: ['ㅍ','ㅗ','ㄷ','ㅗ'] },
];

const CONSONANTS = ['ㄱ','ㄴ','ㄷ','ㄹ','ㅁ','ㅂ','ㅅ','ㅇ','ㅈ','ㅊ','ㅋ','ㅌ','ㅍ','ㅎ','ㄲ','ㄸ','ㅃ','ㅆ','ㅉ'];
const VOWELS    = ['ㅏ','ㅑ','ㅓ','ㅕ','ㅗ','ㅛ','ㅜ','ㅠ','ㅡ','ㅣ','ㅐ','ㅔ','ㅘ','ㅚ','ㅝ','ㅟ','ㅢ'];

// ══════════════════════════════
//  게임 상태
// ══════════════════════════════
let gameState = {
  running: false,
  stage: 1,
  score: 0,
  timer: 60,
  currentWord: null,
  collectedJamo: [],
  bubbles: [],
  particles: [],
  glowBursts: [],
  handLandmarks: null,
  isFist: false,
  fistCooldown: 0,
  completeCooldown: 0,
};

// ══════════════════════════════
//  Canvas 설정
// ══════════════════════════════
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const gameWrap = document.getElementById('game-wrap');

function resizeCanvas() {
  canvas.width = gameWrap.clientWidth;
  canvas.height = gameWrap.clientHeight;
}
resizeCanvas();
window.addEventListener('resize', () => { resizeCanvas(); respawnBubbles(); });

// ══════════════════════════════
//  버블 클래스
// ══════════════════════════════
class Bubble {
  constructor(char, x, y) {
    this.char = char;
    this.isVowel = VOWELS.includes(char);
    this.x = x;
    this.y = y;
    this.r = 38 + Math.random() * 14;
    this.pulsePhase = Math.random() * Math.PI * 2;
    this.pulseSpeed = 0.04 + Math.random() * 0.03;
    this.glowAnim = 0;
    this.alive = true;
    this.collected = false;
    // 색상
    this.baseColor = this.isVowel ? '#FFD060' : '#FF4B2B';
    this.glowColor = this.isVowel ? 'rgba(255,208,96,' : 'rgba(255,75,43,';
  }

  update() {
    this.pulsePhase += this.pulseSpeed;
    if (this.glowAnim > 0) this.glowAnim -= 0.06;
  }

  draw(ctx) {
    const pulse = Math.sin(this.pulsePhase);
    const scaleR = this.r + pulse * 4;
    const glowExtra = this.glowAnim * 30;
    const alpha = 0.18 + pulse * 0.06 + this.glowAnim * 0.3;

    ctx.save();
    ctx.translate(this.x, this.y);

    // 외부 글로우 링
    const ringCount = 3;
    for (let i = ringCount; i >= 1; i--) {
      const ringR = scaleR + i * 10 + glowExtra * (i * 0.5);
      const ringAlpha = (alpha / ringCount) * (ringCount - i + 1) * 0.5;
      ctx.beginPath();
      ctx.arc(0, 0, ringR, 0, Math.PI * 2);
      ctx.fillStyle = this.glowColor + ringAlpha + ')';
      ctx.fill();
    }

    // 버블 본체
    const grad = ctx.createRadialGradient(-scaleR * 0.3, -scaleR * 0.3, 2, 0, 0, scaleR);
    grad.addColorStop(0, this.isVowel ? 'rgba(255,240,180,0.95)' : 'rgba(255,140,80,0.95)');
    grad.addColorStop(0.6, this.isVowel ? 'rgba(255,208,60,0.8)' : 'rgba(255,75,43,0.8)');
    grad.addColorStop(1, this.isVowel ? 'rgba(200,140,0,0.4)' : 'rgba(180,30,0,0.4)');

    ctx.beginPath();
    ctx.arc(0, 0, scaleR, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.shadowColor = this.baseColor;
    ctx.shadowBlur = 20 + glowExtra;
    ctx.fill();

    // 테두리
    ctx.strokeStyle = this.isVowel ? 'rgba(255,230,100,0.8)' : 'rgba(255,120,80,0.8)';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // 하이라이트
    ctx.beginPath();
    ctx.arc(-scaleR * 0.28, -scaleR * 0.28, scaleR * 0.22, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();

    // 한글 자모 (ㅇ처럼 속빈 글자도 잘 보이도록 외곽선+채우기 이중 렌더)
    const fontSize = Math.floor(scaleR * 0.78);
    ctx.font = `900 ${fontSize}px 'Noto Sans KR', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.lineJoin = 'round';
    // 외곽선으로 속빈 글자 보완
    ctx.strokeStyle = this.isVowel ? 'rgba(100,60,0,0.8)' : 'rgba(255,255,255,0.6)';
    ctx.lineWidth = fontSize * 0.09;
    ctx.shadowColor = this.isVowel ? 'rgba(255,160,0,0.7)' : 'rgba(255,80,30,0.7)';
    ctx.shadowBlur = 8;
    ctx.strokeText(this.char, 0, 1);
    // 채우기
    ctx.fillStyle = this.isVowel ? '#1a1a1a' : '#ffffff';
    ctx.shadowBlur = 0;
    ctx.fillText(this.char, 0, 1);

    ctx.restore();
  }

  triggerGlow() {
    this.glowAnim = 1.0;
  }
}

// ══════════════════════════════
//  파티클 (글로우 버스트용)
// ══════════════════════════════
class GlowBurst {
  constructor(x, y, color) {
    this.x = x;
    this.y = y;
    this.color = color;
    this.rings = [];
    for (let i = 0; i < 4; i++) {
      this.rings.push({ r: 0, maxR: 80 + i * 30, alpha: 1.0, speed: 4 + i * 2 });
    }
    this.particles = [];
    for (let i = 0; i < 20; i++) {
      const angle = (Math.PI * 2 / 20) * i + Math.random() * 0.3;
      const speed = 3 + Math.random() * 5;
      this.particles.push({
        x: 0, y: 0,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        r: 2 + Math.random() * 4,
        alpha: 1.0,
        decay: 0.03 + Math.random() * 0.03,
      });
    }
    this.alive = true;
  }

  update() {
    let anyAlive = false;
    this.rings.forEach(ring => {
      ring.r += ring.speed;
      ring.alpha = Math.max(0, 1 - ring.r / ring.maxR);
      if (ring.alpha > 0) anyAlive = true;
    });
    this.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.94;
      p.vy *= 0.94;
      p.alpha -= p.decay;
      if (p.alpha > 0) anyAlive = true;
    });
    if (!anyAlive) this.alive = false;
  }

  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);

    // 링
    this.rings.forEach(ring => {
      if (ring.alpha <= 0) return;
      ctx.beginPath();
      ctx.arc(0, 0, ring.r, 0, Math.PI * 2);
      ctx.strokeStyle = this.color.replace(')', `,${ring.alpha})`).replace('rgb', 'rgba');
      ctx.lineWidth = 3;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 20;
      ctx.stroke();
    });

    // 파티클
    this.particles.forEach(p => {
      if (p.alpha <= 0) return;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      const c = this.color;
      ctx.fillStyle = c.includes('rgba') ? c : c + `${p.alpha})`;
      ctx.shadowColor = this.color;
      ctx.shadowBlur = 12;
      ctx.globalAlpha = p.alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

// ══════════════════════════════
//  게임 로직
// ══════════════════════════════
function loadWord() {
  const idx = (gameState.stage - 1) % WORD_LIST.length;
  gameState.currentWord = WORD_LIST[idx];
  gameState.collectedJamo = new Array(gameState.currentWord.jamo.length).fill(false);
  updateWordCard();
  respawnBubbles();
}

function updateWordCard() {
  const w = gameState.currentWord;
  document.getElementById('target-word').textContent = w.word;

  const track = document.getElementById('collect-track');
  track.innerHTML = '';
  w.jamo.forEach((j, i) => {
    const slot = document.createElement('div');
    slot.className = 'jamo-slot' + (gameState.collectedJamo[i] ? ' collected' : '');
    slot.textContent = j; // 유아용: 처음부터 자모 표시
    slot.id = `slot-${i}`;
    track.appendChild(slot);
  });
}

function respawnBubbles() {
  const W = canvas.width, H = canvas.height;
  // 목표 자모를 개수만큼 그대로 사용 (디코이 없음)
  const jamoList = [...gameState.currentWord.jamo].sort(() => Math.random() - 0.5);
  const count = jamoList.length;

  // 그리드 기반 균등 배치 (겹침 방지)
  const cols = Math.ceil(Math.sqrt(count * 1.6));
  const rows = Math.ceil(count / cols);
  const marginX = W * 0.12;
  const marginY = H * 0.10;
  const cellW = (W - marginX * 2) / cols;
  const cellH = (H - marginY * 2) / rows;

  const positions = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (positions.length >= count) break;
      // 셀 중심에서 ±20% 랜덤 오프셋
      const jitter = 0.2;
      const x = marginX + cellW * (c + 0.5) + (Math.random() - 0.5) * cellW * jitter;
      const y = marginY + cellH * (r + 0.5) + (Math.random() - 0.5) * cellH * jitter;
      positions.push({ x, y });
    }
  }
  // 위치 셔플
  positions.sort(() => Math.random() - 0.5);

  gameState.bubbles = jamoList.map((char, i) => {
    const b = new Bubble(char, positions[i].x, positions[i].y);
    // 유아용: 버블 크기를 화면 기준으로 키움
    b.r = Math.min(W, H) * 0.085;
    return b;
  });
}

function collectJamo(char) {
  const jamo = gameState.currentWord.jamo;
  for (let i = 0; i < jamo.length; i++) {
    if (jamo[i] === char && !gameState.collectedJamo[i]) {
      gameState.collectedJamo[i] = true;
      gameState.score += 10;
      document.getElementById('score-val').textContent = gameState.score;

      const slot = document.getElementById(`slot-${i}`);
      if (slot) { slot.className = 'jamo-slot collected'; slot.textContent = char; }

      // 전체 완성 체크
      if (gameState.collectedJamo.every(v => v)) {
        setTimeout(onWordComplete, 400);
      }
      return true;
    }
  }
  return false;
}

function onWordComplete() {
  const overlay = document.getElementById('complete-overlay');
  document.getElementById('complete-word-display').textContent = gameState.currentWord.word;
  document.getElementById('word-card').classList.add('complete');
  overlay.classList.add('show');
  gameState.score += 50;
  document.getElementById('score-val').textContent = gameState.score;

  setTimeout(() => {
    overlay.classList.remove('show');
    document.getElementById('word-card').classList.remove('complete');
    gameState.stage++;
    document.getElementById('stage-val').textContent = gameState.stage;
    loadWord();
  }, 2000);
}

// ══════════════════════════════
//  손 인식 로직
// ══════════════════════════════
function isFistGesture(landmarks) {
  // 각 손가락의 끝(tip)과 두 번째 마디(pip) y좌표 비교
  // tip y가 pip y보다 크면(=아래에 있으면) 접힌 것
  const fingers = [
    [8, 6],   // 검지
    [12, 10], // 중지
    [16, 14], // 약지
    [20, 18], // 소지
  ];
  const folded = fingers.filter(([tip, pip]) => landmarks[tip].y > landmarks[pip].y);
  return folded.length >= 3; // 3개 이상 접히면 주먹
}

function getHandCenter(landmarks) {
  // 손바닥 중심 (landmark 0, 5, 9, 13, 17 평균)
  const pts = [0, 5, 9, 13, 17].map(i => landmarks[i]);
  return {
    x: pts.reduce((s, p) => s + p.x, 0) / pts.length,
    y: pts.reduce((s, p) => s + p.y, 0) / pts.length,
  };
}

function handleFist(landmarks) {
  if (gameState.fistCooldown > 0) return;

  const center = getHandCenter(landmarks);
  const W = canvas.width, H = canvas.height;
  // MediaPipe 좌표 [0~1] → Canvas 좌표 (좌우반전)
  const hx = (1 - center.x) * W;
  const hy = center.y * H;

  gameState.bubbles.forEach(bubble => {
    if (!bubble.alive) return;
    const dist = Math.hypot(bubble.x - hx, bubble.y - hy);
    if (dist < bubble.r + 40) {
      bubble.alive = false;
      // 글로우 버스트 이펙트
      const color = bubble.isVowel ? 'rgba(255,208,96,' : 'rgba(255,75,43,';
      gameState.glowBursts.push(new GlowBurst(bubble.x, bubble.y, color + '1)'));

      // 목표 자모면 수집
      const isTarget = collectJamo(bubble.char);

      // 디코이는 점수 감점 없이 그냥 터뜨림
      gameState.fistCooldown = 18; // 0.3초 쿨다운
    }
  });
}

// ══════════════════════════════
//  그리기
// ══════════════════════════════
function drawHandOverlay(landmarks) {
  if (!landmarks) return;
  const W = canvas.width, H = canvas.height;

  // 손 연결선
  const connections = [
    [0,1],[1,2],[2,3],[3,4],
    [0,5],[5,6],[6,7],[7,8],
    [5,9],[9,10],[10,11],[11,12],
    [9,13],[13,14],[14,15],[15,16],
    [13,17],[17,18],[18,19],[19,20],
    [0,17]
  ];

  ctx.save();
  ctx.strokeStyle = 'rgba(255,75,43,0.35)';
  ctx.lineWidth = 2;
  connections.forEach(([a, b]) => {
    const lA = landmarks[a], lB = landmarks[b];
    ctx.beginPath();
    ctx.moveTo((1-lA.x)*W, lA.y*H);
    ctx.lineTo((1-lB.x)*W, lB.y*H);
    ctx.stroke();
  });

  // 랜드마크 점
  landmarks.forEach((lm, i) => {
    const x = (1 - lm.x) * W;
    const y = lm.y * H;
    ctx.beginPath();
    ctx.arc(x, y, i === 8 ? 7 : 4, 0, Math.PI * 2);
    ctx.fillStyle = i === 8 ? '#FFD700' : 'rgba(255,75,43,0.7)';
    ctx.shadowColor = i === 8 ? '#FFD700' : '#FF4B2B';
    ctx.shadowBlur = i === 8 ? 14 : 6;
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // 손 중심 커서
  const center = getHandCenter(landmarks);
  const cx = (1 - center.x) * W;
  const cy = center.y * H;
  ctx.beginPath();
  ctx.arc(cx, cy, gameState.isFist ? 28 : 20, 0, Math.PI * 2);
  ctx.strokeStyle = gameState.isFist ? 'rgba(255,75,43,0.9)' : 'rgba(255,255,255,0.25)';
  ctx.lineWidth = gameState.isFist ? 3 : 1.5;
  ctx.shadowColor = '#FF4B2B';
  ctx.shadowBlur = gameState.isFist ? 20 : 5;
  ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.restore();
}

// ══════════════════════════════
//  게임 루프
// ══════════════════════════════
function gameLoop() {
  if (!gameState.running) return;

  const W = canvas.width, H = canvas.height;

  // 배경
  ctx.fillStyle = '#111111';
  ctx.fillRect(0, 0, W, H);

  // 배경 노이즈 효과 (미묘한 그리드)
  ctx.save();
  ctx.strokeStyle = 'rgba(255,75,43,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 60) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 60) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  ctx.restore();

  // 버블 업데이트 & 그리기
  gameState.bubbles.forEach(b => { if (b.alive) { b.update(); b.draw(ctx); } });

  // 글로우 버스트
  gameState.glowBursts = gameState.glowBursts.filter(g => g.alive);
  gameState.glowBursts.forEach(g => { g.update(); g.draw(ctx); });

  // 손 오버레이
  if (gameState.handLandmarks) {
    drawHandOverlay(gameState.handLandmarks);
    const fist = isFistGesture(gameState.handLandmarks);
    gameState.isFist = fist;

    const ring = document.getElementById('fist-ring');
    if (fist) {
      ring.classList.add('active');
      handleFist(gameState.handLandmarks);
    } else {
      ring.classList.remove('active');
    }
  }

  if (gameState.fistCooldown > 0) gameState.fistCooldown--;

  requestAnimationFrame(gameLoop);
}

// ══════════════════════════════
//  타이머
// ══════════════════════════════
let timerInterval;
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    if (!gameState.running) return;
    gameState.timer--;
    document.getElementById('timer-val').textContent = gameState.timer;
    if (gameState.timer <= 0) {
      // 타임오버 — 다음 스테이지
      gameState.timer = 60;
      gameState.stage++;
      document.getElementById('stage-val').textContent = gameState.stage;
      loadWord();
    }
  }, 1000);
}

// ══════════════════════════════
//  MediaPipe 초기화
// ══════════════════════════════
async function initMediaPipe() {
  const video = document.getElementById('webcam');
  const statusBadge = document.getElementById('status-badge');

  const hands = new Hands({
    locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
  });

  hands.setOptions({
    maxNumHands: 1,
    modelComplexity: 1,
    minDetectionConfidence: 0.7,
    minTrackingConfidence: 0.6,
  });

  hands.onResults(results => {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
      gameState.handLandmarks = results.multiHandLandmarks[0];
      statusBadge.textContent = '✋ 손 인식 중';
      statusBadge.className = 'ready';
    } else {
      gameState.handLandmarks = null;
      statusBadge.textContent = '👋 손을 보여주세요';
      statusBadge.className = '';
    }
  });

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480, facingMode: 'user' }
    });
    video.srcObject = stream;
    video.onloadedmetadata = () => {
      video.play();
      const camera = new Camera(video, {
        onFrame: async () => { await hands.send({ image: video }); },
        width: 640, height: 480
      });
      camera.start();
      statusBadge.textContent = '📷 손을 화면에 보여주세요';
    };
  } catch (e) {
    statusBadge.textContent = '⚠️ 카메라 권한 필요';
    console.error('카메라 접근 실패:', e);
  }
}

// ══════════════════════════════
//  게임 시작
// ══════════════════════════════
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  gameState.running = true;
  gameState.stage = 1;
  gameState.score = 0;
  gameState.timer = 60;
  document.getElementById('score-val').textContent = '0';
  document.getElementById('stage-val').textContent = '1';
  document.getElementById('timer-val').textContent = '60';

  loadWord();
  gameLoop();
  startTimer();
  initMediaPipe();
});
</script>
